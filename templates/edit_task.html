<!DOCTYPE html>
<html>
<head>

    <title>Edit Task</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Edit Task</h1>

    <form method="POST">

        <input type="text"
               name="title"
               value="{{ task.title }}"
               required>

        <textarea name="description"
                  required>{{ task.description }}</textarea>

        <input type="text"
               name="priority"
               value="{{ task.priority }}"
               required>

        <input type="text"
               name="status"
               value="{{ task.status }}"
               required>

        <button type="submit">
            Update Task
        </button>

    </form>

</div>

</body>
</html>
